<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Two Box Table</title>



    <style>
        /* Table container styling */
        table {
            width: 100%;
            border-collapse: collapse; /* Removes space between cells */
            border: 1px solid #333;    /* Outer border */
            font-family: Arial, Verdana, Geneva, Tahoma, sans-serif;
        }

        /* Styling for the table cells */
        td {
            height: 150px;             /* Height of the boxes */
            padding: 20px;             /* Space around the text */
            vertical-align: middle;    /* Centers text vertically */
            border: 1px solid #333;    /* Internal divider line */
        }

        /* Color for the first box (Olive/Greenish) */
        .box-one {
            background-color: #b8c17a; 
            width: 50%;
        }

        /* Color for the second box (Salmon/Pinkish) */
        .box-two {
            background-color: #f7b7a3;
            width: 50%;
        }
    </style>
</head>
<body>
  <center>
      <h1>How do u think about my work ? </h1>
  </center>
    <table>
        <tr>
            <td class="box-one">Yeah</td>
            <td class="box-two">It's so bad</td>
        </tr>
    </table>

</body>
</html>
