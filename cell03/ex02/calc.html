<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="calc.css">
</head>
<body>

    <div class="calculator-container">
        <input type="text" id="leftMember" placeholder="Left Value">
        
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
            <option value="%">%</option>
        </select>

        <input type="text" id="rightMember" placeholder="Right Value">
        
        <input type="submit" id="submitBtn" value="Try me!">
    </div>

    <script src="calc.js"></script>
</body>
</html>
